approach:
  hero:
    tag: "TECHNOLOGIE"
    title: "La science de la santé mentale qui s'adapte à vous"
    description: "Entrelacs combine la modélisation psychométrique dynamique avec l'IA conversationnelle pour créer des évaluations de santé mentale qui s'adaptent à chaque personne en temps réel — offrant des informations plus précises avec une meilleure expérience utilisateur et moins de charge d'évaluation."

  science:
    tag: "Notre fondement scientifique"
    title: "La première plateforme d'évaluation fondée sur la théorie des réseaux de symptômes et l'IA adaptative"
    intro: "La plupart des outils de santé mentale capturent un instantané. Le nôtre capture l'ensemble du tableau."
    stats:
      r_and_d: "3 ans de R&D"
      research_articles: "80 000+ articles de recherche"
      interviews: "350+ entretiens"
      countries: "Validation dans 8 pays"
    subtitle: "En commençant par le lien social — et en étendant à d'autres dimensions de la santé mentale."
    cards:
      network_psychometrics:
        title: "Innovation en psychométrie en réseau"
        body: "La santé mentale ne se résume pas à un seul symptôme — la dépression à elle seule implique ~52 symptômes interconnectés. Les évaluations traditionnelles submergent souvent les personnes avec trop de questions ou manquent des liens critiques en en posant trop peu. Notre combinaison de psychométrie avancée et d'IA identifie le minimum de questions nécessaires pour reconstruire avec précision un réseau complet de symptômes. C'est comme reconstituer une image entière à partir de pièces de puzzle soigneusement choisies."
      cross_cultural:
        title: "Validation interculturelle"
        body: "La plupart des outils de santé mentale échouent en dehors de leur contexte de développement initial. Le nôtre non. En commençant par le lien social, notre système s'appuie sur une synthèse de plus de 80 000 articles de recherche, 350+ entretiens approfondis menés à l'échelle mondiale et une validation dans 8 pays. Cette base permet à Entrelacs de fonctionner à travers les géographies, les démographies et les cultures sans biais."
        body_2: "Si nous commençons par la connexion sociale, d'autres dimensions de la santé mentale — comme la dépression et l'anxiété — seront développées selon la même feuille de route scientifique."
      continuous_learning:
        title: "Système d'apprentissage continu"
        body: "Entrelacs s'améliore à chaque interaction. Notre IA crée une boucle vertueuse de données : plus d'utilisateurs génèrent des données longitudinales plus riches, qui alimentent des prédictions plus intelligentes, qui produisent de meilleurs résultats. Chaque évaluation renforce la capacité de l'algorithme à prédire quelles interventions fonctionnent pour des profils spécifiques, à détecter les signaux d'alerte précoces propres à chaque individu et à recommander des parcours de soins personnalisés."
      regulatory_pathway:
        title: "Parcours réglementaire et clinique"
        body: "Entrelacs suit une trajectoire claire vers une validation de niveau médical — marquage CE (dispositif médical de classe IIa dans l'UE) ciblé pour T2 2027, soutenu par des études de validation clinique en cours et une feuille de route d'intégration aux hôpitaux et systèmes de santé."
    bottom_cta_text: "Discutez avec l'équipe Entrelacs pour découvrir la science."
    bottom_cta_button: "Nous contacter"

  collabs:
    badge: "Partenariats de recherche et validation"
    title: "Des collaborations scientifiques de premier plan"
    intro: "Entrelacs repose sur des partenariats avec les institutions qui façonnent l'avenir des politiques et de la recherche en santé mentale à l'échelle mondiale."
    foundations:
      columns:
        - title: "Intégration aux politiques publiques"
          items:
