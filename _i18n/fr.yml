  common:
    more: "Lire la suite de l'histoire du Dr Hans"
    less: "Lire moins"

team:
  leadership:
    title: "Équipe de direction"
    subtitle: "Une expertise dédiée couvrant la science, la technologie et la santé."
    list:
      - name: "Dr Hans Rocha IJzerman"
        role: "CEO et co-fondateur"
        bio: "Conseiller en politique de santé mentale auprès de l'OMS et de l'UE. Chercheur affilié à l'Université d'Oxford. Chercheur principal du projet européen LONELY-EU Horizon Europe (3 M€). Chercheur publié avec plus de 10 000 citations académiques et l'un des plus grands experts mondiaux sur les liens sociaux et la santé mentale."
        image: "/images/LeadershipHans.png"
      - name: "Miguel Silan"
        role: "Directeur scientifique"
        bio: "Directeur associé du Psychological Science Accelerator — un réseau de recherche mondial couvrant plus de 80 pays. Titulaire d'un doctorat en psychologie, spécialisé dans les études à grande échelle de systèmes psychologiques complexes. Auteur de plus de 1 200 citations académiques. A dirigé des études comportementales phares dans plus de 20 pays afin d'établir des cadres de mesure multidomaines culturellement robustes. Le pilier scientifique derrière la validation interculturelle et la méthodologie psychométrique d'Entrelacs."
        image: "/images/LeadershipMigs.png"
      - name: "Felix Moses"
        role: "Directeur de la technologie"
        bio: "Ingénieur et créateur d'IA possédant une solide expérience de travail avec des équipes multidisciplinaires pour concevoir des solutions prêtes pour le marché. Expert en développement full-stack, en infrastructure GCP et en pipelines de données sécurisés — l'architecte de la fondation technique d'Entrelacs."
        image: "/images/LeadershipFelix.png"
  extendedLeadership:
    title: "Équipe de direction élargie"
    list:
      - name: "Daniela Rocha Lopes"
        role: "Directrice clinique"
        bio: "Psychologue clinicienne avec plus de 15 ans d'expérience dans la pratique et les opérations en santé mentale. Directrice générale de Solstice Psychologues. Garantit l'intégrité clinique de chaque élément de la plateforme Entrelacs."
        image: "/images/LeadershipDaniela.png"
      - name: "Hilary Johnson"
        role: "Directrice produit"
        bio: "Ancienne vice-présidente produit chez Unmind. Plus de 15 ans d'expérience en UX dans la santé numérique. Apporte un leadership produit de classe mondiale à l'expérience utilisateur et aux flux de travail cliniques d'Entrelacs."
        image: "/images/LeadershipHilary.png"
      - name: "Matthew Reed"
        role: "Directeur financier"
        bio: "Cadre financier avec 15 ans d'expérience dans les énergies propres et les secteurs réglementés. Ancien cadre du groupe EDF. A supervisé la levée de 26 milliards de dollars en capital ESG tout au long de sa carrière. Dirige la stratégie financière et les relations avec les investisseurs d'Entrelacs."
        image: "/images/LeadershipMatthew.png"
      - name: "Cristina Claver Sicilia"
        role: "Directrice des opérations"
        bio: "Docteure en pharmacie, MBA. Experte en opérations de santé avec une solide expérience dans la direction de la mise en œuvre de stratégies pharmaceutiques à travers l'Europe. Promeut l'excellence opérationnelle et l'accès au marché européen pour Entrelacs."
        image: "/images/LeadershipCristina.png"
  advisors:
    title: "Conseillers stratégiques"
    subtitle: "Guidés par les esprits qui façonnent l'avenir de l'IA, des sciences du comportement et de la santé mondiale."
    list:
      - name: "Dr Michal Kosinski"
        role: "Université de Stanford"
        bio: "Expert de renommée mondiale en prédiction comportementale basée sur l'IA et en psychométrie. Ses recherches sur les empreintes numériques et le profilage psychologique ont été citées plus de 25 000 fois. Conseille sur la méthodologie d'IA et les modèles de prédiction comportementale d'Entrelacs."
        image: "/images/DrMichalKosinski.png"
      - name: "Jillian Miranda"
        role: "Stratège en croissance Medtech"
        bio: "A précédemment développé plusieurs entreprises de santé numérique, de la phase pilote à l'adoption mondiale. Experte en stratégie de mise sur le marché des soins de santé et en modèles B2B2C. Guide la stratégie commerciale et la croissance de l'entreprise d'Entrelacs."
        image: "/images/JillianMiranda.png"
      - name: "Ron Ivey"
        role: "Fondateur, HumanConnection.AI"
        bio: "Leader d'opinion en matière d'éthique de l'IA et de déploiement responsable de l'IA dans les milieux de la santé. Conseille sur le positionnement réglementaire, les pratiques éthiques en matière d'IA et le déploiement responsable dans les environnements cliniques."
        image: "/images/RonIvey.png"
      - name: "Carson Kelly"
        role: "Compassion 2.0"
        bio: "Vétéran de la technologie et défenseur de Compassion 2.0. Conseille sur l'intégration de modèles axés sur la compassion dans notre plateforme."
        image: "/images/CarsonKelly.png"
      - name: "Emorie Beck"
        role: "UC Davis"
        bio: "Experte de premier plan en mesure psychologique personnalisée et en recherche sur les différences individuelles. Guide la méthodologie psychométrique et la science de la mesure qui sous-tendent le moteur d'évaluation d'Entrelacs."
        image: "/images/emoriebeck.jpg"

