    tag: "Qui nous servons"
    heading: "Une seule plateforme. Connecter les employeurs, les cliniciens et les systèmes de santé"
    cards:
      - bg_color: "#F2EFE9"
        title: "Pour les employeurs"
        desc: "Repérez tôt les risques pour la santé mentale de vos employés, avant qu'ils ne se transforment en crises coûteuses."
