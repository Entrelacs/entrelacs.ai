home:
  meta:
    title: "Entrelacs"
  video_link: https://www.youtube.com/embed/PdfPGtb_Aps?si=K_OAVAhh3ICuyiM 
  hero:
    tag_text: "IA de qualité clinique pour la santé mentale"
    title_prefix: "La santé mentale bénéficie enfin d'une détection précoce"
    wheel:
      item1: "quand cela compte"
      item2: "avec l'IA clinique"
      item3: "avant la crise"
      item4: "quand cela compte"
    cta_waitlist: "Rejoignez la liste d'attente pour un accès complet"
    cta_demo: "Demander une démo"
  problem:
    tag: "Le problème"
    heading: "La santé mentale est le seul domaine médical sans détection précoce "
    description: "Dépistage, mise en relation et suivi de qualité clinique — pour que vous puissiez agir des semaines avant une crise, et non des mois après."
    cardiology:
      title: "En cardiologie"
      desc: "Nous détectons les signes avant-coureurs des années avant qu'une crise cardiaque ne se produise."
    oncology:
      title: "En oncologie"
      desc: "Nous effectuons des dépistages avant l'apparition des symptômes."
    mental_health:
      title: "Mais en <br> santé mentale"
      desc: "Nous attendons que quelqu'un soit déjà en crise — lorsque le coût est le plus élevé et que la fenêtre de prévention est déjà passée."
  cost:
    heading: "Le coût de l'attente"
    description: "Nous manquons les signes avant-coureurs qui pourraient prévenir des problèmes plus importants à l'avenir, en attendant que quelqu'un soit déjà en difficulté avant d'agir."
    stats:
      - value: "600 Md€"
        text: "Coût annuel dans la seule UE dû aux soins de santé mentale réactifs."
      - value: "10–20 %"
        text: "Croissance annuelle des demandes de remboursement en santé mentale observées par les payeurs."
      - value: "15 K€"
        text: "Perte par employé et par an en productivité et en rotation du personnel."
  pillars:
    heading: "De la réactivité à la prévention en trois étapes"
    description: "Trois piliers qui font passer les soins de santé mentale d'une réponse réactive aux crises à des résultats proactifs et mesurables."
    cta: "Rejoindre la liste d'attente"
    list:
      - image: "/images/dart-mission-goal-success.svg"
        tag: "PRÉCISION"
        title: "Un dépistage d'une précision clinique, sans approximations"
        desc: "Une évaluation conversationnelle de 15 minutes crée un profil de santé mentale unique pour chaque individu, remplaçant les évaluations traditionnelles longues et fastidieuses."
      - image: "/images/health.svg"
        tag: "PERSONNALISATION"
        title: "Fini les orientations par essais et erreurs"
        desc: "L'IA associe chaque individu à l'intervention la plus efficace dès le premier jour, réduisant ainsi les échecs de traitement et accélérant le temps d'amélioration de 2 à 3 fois."
      - image: "/images/fraudprotectmajor.svg"
        tag: "PRÉVENTION"
        title: "Détecter la détérioration des semaines avant la crise"
        desc: "La surveillance numérique continue suit les changements d'engagement, les modèles linguistiques et les signaux comportementaux entre les séances, alertant les équipes de soins des jours, voire des semaines avant une crise, transformant ainsi les soins réactifs en soins préventifs."
  how_it_works:
    tag: "Comment ça marche"
    heading: "Trois étapes. Aucune perturbation. En direct en quelques semaines."
    description: "Trois étapes qui s'intègrent aux flux de travail existants, sans nécessiter de temps clinique supplémentaire."
    cards:
      screen:
        tag: "DÉPISTAGE"
        title: "Évaluation de 15 minutes"
        desc: "Une évaluation par IA conversationnelle identifie les 5 à 7 questions les plus informatives propres à chaque personne, dépistant l'humeur, l'anxiété, les liens sociaux, l'épuisement professionnel et les facteurs de risque en une seule session de 15 minutes."
        benefits:
          - "Catégories de risque claires par personne"
          - "Exhaustif"
          - "Aucun temps clinique requis"
      match:
        tag: "MISE EN RELATION"
        title: "Mise en relation de soins de précision"
        desc: "40 à 60 % des personnes abandonnent les soins de santé mentale lorsque le premier traitement ne convient pas. La mise en relation de précision connecte chaque personne à la bonne intervention dès le premier jour, permettant une amélioration 2 à 3 fois plus rapide sans essais et erreurs."
        benefits:
          - "Le bon soutien, du premier coup"
          - "Moins d'échecs de traitement"
          - "Amélioration 2 à 3 fois plus rapide"
      monitor:
        tag: "SUIVI"
        title: "Suivi continu"
        desc: "Entre les rendez-vous, la plateforme suit en permanence les modèles comportementaux (notamment l'engagement numérique, les indicateurs linguistiques, l'activité, le sommeil et l'humeur autodéclarée), détectant les signes de détérioration des jours, voire des semaines avant qu'une crise ne se développe. Cette capacité d'alerte précoce crée une fenêtre critique pour une intervention opportune et à faible coût avant que la situation ne s'aggrave."
        benefits:
          - "Alertes avant que les problèmes ne s'aggravent"
          - "Suit les changements entre les visites"
          - "Alerte précoce avant une crise"
  research:
    heading: "Rigueur de niveau recherche, preuves en conditions réelles"
    description: "Fondé sur plus de 80 000 articles de recherche, validé dans 8 pays et soutenu par 3 millions d'euros de financement de l'UE."
    partnership: "Développé en partenariat avec l'OMS et les cadres politiques de l'UE"
    stats:
      - value: "+ de 80 K"
        label: "Articles de recherche examinés"
      - value: "8"
        label: "Pays validés"
      - value: "3 M€"
        label: "Financement de recherche de l'UE accordé"
      - value: "Marquage CE"
        label: "Parcours de certification, 2027"
  partners:
    heading: "Développé en collaboration avec les plus grandes institutions de recherche au monde"
    description: "Entrelacs repose sur des partenariats scientifiques mondiaux qui garantissent que chaque allégation clinique est fondée sur des preuves."
    logos:
      - src: "/images/university_of_california.png"
      - src: "/images/oecd.png"
      - src: "/images/university_of_oxford.png"
      - src: "/images/stanford_university.png"
      - src: "/images/european_commission.png"
        style: "max-height: 80px;"
