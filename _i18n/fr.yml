            - "Projet de recherche européen LONELY‑EU (Horizon Europe, 3 M€)"
            - "Coopérations avec l’OCDE sur les standards de mesure de la santé sociale"
            - "Affiliation de recherche avec l’Université d’Oxford"
        - title: "Réseau académique"
          items:
            - "Psychological Science Accelerator — réseau de recherche dans 80+ pays"
            - "Partenariat avec l’Université de Stanford sur la prédiction comportementale par IA"
            - "Partenariat avec l’Université UC Davis sur la mesure psychologique personnalisée"
            - "Essais cliniques multi‑sites à travers les systèmes de santé"
        - title: "Données probantes en conditions réelles"
          items:
            - "Publications évaluées par les pairs en préparation"
            - "Suivi des résultats cliniques à travers les programmes pilotes"
            - "Études d’impact populationnel en cours"
            - "Validation de l’efficacité à long terme en cours"

  trust:
    badge: "Fondation confidentialité et sécurité"
    title: "Conçu pour une confiance de niveau médical"
    intro: "Chaque élément d'Entrelacs est conçu pour répondre aux standards les plus élevés en matière de confidentialité des données, de sécurité et d'éthique clinique."
    data:
      title: "Architecture des données"
      items:
        - "Infrastructure chiffrée conforme au RGPD"
        - "Conformité multi-juridictionnelle (UE, Royaume-Uni, Suisse, États-Unis)"
        - "Feuille de route de certification ISO 13485 et ISO 27001"
        - "Normes de sécurité au niveau des systèmes de santé"
