about:
  hero:
    tag: "À PROPOS DE NOUS"
    heading: "La première plateforme conçue pour prédire les crises de santé mentale — avant qu'elles ne surviennent"
    p1: "Entrelacs est une plateforme de santé mentale préventive alimentée par l'IA qui dépiste, oriente et surveille les individus avec une précision clinique — détectant la détérioration des semaines avant la crise, afin que le bon soutien arrive avant qu'il ne soit urgent."
    p2: "S'appuyant sur trois ans de R&D, plus de 80 000 articles de recherche et une validation clinique dans 8 pays et 37 marchés mondiaux, Entrelacs réunit la modélisation psychométrique dynamique, l'IA conversationnelle et la surveillance continue en une seule plateforme — conçue pour les employeurs, les cliniciens et les systèmes de santé."
    p3: "Nous existons parce que la santé mentale est le seul domaine médical sans système d'alerte précoce fiable. Nous sommes là pour changer cela."
  vision_mission:
    heading: "Vision et mission"
    description: "Un monde où les crises de santé mentale sont prédites, prévenues et ne sont plus inévitables."
    cards:
      - title: "Vision"
        desc: "Un avenir où les soins de santé mentale fonctionnent comme tout autre domaine médical — avec un dépistage de routine, une détection précoce et une intervention proactive comme norme, et non comme exception."
      - title: "Mission"
        desc: "Rendre les soins de santé mentale préventifs universellement accessibles grâce à une psychométrie avancée et à une IA de qualité clinique — en donnant aux individus, aux cliniciens, aux employeurs et aux systèmes de santé les outils pour agir avant que la crise ne frappe."
  pillars:
    heading: "Nos trois piliers"
    t1: "Précision"          
    t2: "Personnalisation"
    t3: "Prévention"
  story:
    heading: "Notre histoire"
    subheading: "Née d'une vérité dérangeante. Conçue pour y remédier."
    intro: "Entrelacs a commencé par une question qui semble simple mais qui s'avère radicale :"
    question: "Et si le patient<br>moyen n'existait pas ?"
    main_text: "Pendant des décennies, la science de la santé mentale a fonctionné sur une hypothèse commune : trouver le modèle qui correspond à la majorité, construire autour de ce centre et l'appliquer largement. C'est une approche raisonnable. Mais pour une part importante des personnes que ces outils sont censés aider, elle produit la mauvaise réponse. La dépression ne se manifeste pas de la même manière chez tout le monde. Il en va de même pour l'anxiété, la solitude ou l'épuisement professionnel. Un score sur une échelle qui signifie une chose chez un individu peut signifier tout autre chose chez un autre — non pas parce que l'instrument est défectueux, mais parce que les êtres humains diffèrent véritablement dans leur façon de vivre les états psychologiques. Recommander des soins sur la base de ce score, sans comprendre ces différences, cause de réels préjudices. Et parce que chaque erreur de diagnostic s'aggrave — mauvaise voie, mauvais traitement, mois ou années perdus — le coût de cette erreur est une détérioration évitable."
  founder:
    heading: "L'histoire du fondateur"
    subheading: "Le scientifique qui a cessé de croire en la personne moyenne."
    name: "Dr Hans Rocha IJzerman"
    role: "PDG et co-fondateur"
    intro: "Il a fallu deux décennies au sein du courant dominant pour comprendre exactement pourquoi il posait la mauvaise question."
    pullquote: "\"Entrelacs n'est pas conçu pour le patient moyen — car ce patient n'existe pas. Il est conçu pour l'être humain réel, spécifique et irréductiblement individuel qui a besoin de soins.\""
    body: "Un scientifique qui avait passé des années à travailler dans le courant dominant — et qui, lentement, à contrecœur, a acquis la conviction qu'il posait la mauvaise question. Une clinicienne qui voyait quotidiennement ce qui se passait lorsque les outils ignoraient ces différences. Une famille qui en avait ressenti le coût de première main. C'est cette combinaison qui est devenue Entrelacs."
    read_more: "Lire la suite de l'histoire du Dr Hans"
    extended_story:
      - "Le Dr Hans Rocha IJzerman a quitté les Pays-Bas à 18 ans pour jouer au basket-ball en Amérique. Il s'est retrouvé dans la région rurale de la Pennsylvanie, dans un petit collège bénédictin niché dans les collines — Saint Vincent, où Fred Rogers, le célèbre animateur de télévision américain connu sous le nom de Mister Rogers, avait étudié la théologie et développé pour la première fois les convictions qui allaient définir l'œuvre de sa vie. Les moines bénédictins qui ont façonné le collège suivaient la même Règle depuis quinze siècles : accueillir chaque étranger, prêter attention à chaque individu, ne traiter aucune personne comme interchangeable avec une autre. C'était quelque chose que l'on pouvait réellement ressentir — dans la façon dont les étrangers étaient accueillis, dans l'importance accordée à l'écoute, dans l'hypothèse que chaque personne présente dans la pièce avait quelque chose d'irremplaçable à offrir."
      - "Pour un jeune Néerlandais loin de chez lui, naviguant dans une culture qui n'était pas la sienne, quelque chose de cette communauté s'est profondément ancré en lui. Non pas la théologie — mais la conviction sous-jacente que chaque être humain est spécifique, irréductible et non interchangeable avec un autre."
      - "C'est une conviction que sa propre vie ne lui a jamais permis d'oublier. Sa famille est à la fois brésilienne, néerlandaise et française — ses enfants grandissent en naviguant entre des langues et des mondes qui ne se superposent pas parfaitement. L'idée qu'un seul instrument, conçu pour un seul être humain « moyen », puisse capturer ce que l'un d'eux traverse lui a toujours semblé d'une absurdité évidente."
      - "Pendant deux décennies, cette conviction a cohabité difficilement avec la logique dominante de son propre domaine."
      - "Au début de sa carrière, Hans s'est plongé dans l'étude de la culture de l'honneur — fasciné par la façon dont le contexte façonne profondément le comportement et la compréhension de soi. La leçon que les données ne cessaient d'enseigner était la même que celle qu'il avait ressentie instinctivement : l'identité d'une personne modifie la signification de chaque chose. La même action, le même mot, la même expérience — interprétés à travers une vie différente, une culture différente, un soi différent — ne sont pas la même chose."
      - "Mais la psychologie grand public, y compris son propre domaine, a continué à rechercher la moyenne. Mesurer de grands groupes. Trouver la tendance centrale. Construire des outils autour de ce centre. C'était pratique. C'était évolutif. Et pendant longtemps, Hans a également travaillé selon cette logique — parce que c'était la logique du domaine, et parce que les outils pour faire autrement n'existaient pas encore. Ce qui a changé, lentement puis indéniablement, ce sont les preuves."
      - "Le moment où la recherche a rendu cela indéniable est venu d'un sujet inattendu : l'amour romantique. Hans et ses collaborateurs ont entrepris de tester si les instruments standard utilisés pour mesurer la qualité des relations mesuraient réellement la même chose chez différentes personnes. La réponse a été non — clairement, empiriquement et de manière reproductible, non. Bien sûr, les gens vivent l'amour différemment selon qui ils sont. Et si cela était vrai pour l'amour, les implications pour la dépression, l'anxiété, la solitude et tous les autres concepts psychologiques sur lesquels reposaient les outils cliniques étaient importantes. La moyenne n'était pas seulement imprécise. Elle omettait systématiquement quelque chose."
      - "Le coût clinique de cet écart est quelque chose que Hans a vu à travers sa partenaire, Daniela, une psychologue avec 15 ans de pratique. Elle y était constamment confrontée — la difficulté d'interpréter des scores d'échelle qui ne signifiaient pas ce qu'ils semblaient signifier, le risque réel d'orienter quelqu'un vers la mauvaise voie de traitement parce que l'instrument n'avait pas été conçu pour le comprendre en tant qu'individu. Paul Meehl avait passé des décennies à faire valoir que les cliniciens avaient besoin de meilleurs outils actuariels pour traduire les données d'évaluation en bonnes décisions. Des décennies plus tard, les outils n'avaient toujours pas rattrapé leur retard."
      - "Et puis il y a eu l'expérience — partagée, sous une forme ou une autre, par la plupart des familles — d'essayer de trouver les bons soins de santé mentale pour un être cher. Pas des soins dans l'abstrait. Les bons soins, pour cette personne, maintenant. Même avec une formation clinique et une connaissance du système. L'inadéquation entre les besoins individuels et le soutien disponible n'est pas une inefficacité mineure. Elle cause des préjudices qui s'aggravent."
      - "Un scientifique qui avait passé des années à travailler dans le courant dominant — et qui, lentement, à contrecœur, a acquis la conviction qu'il posait la mauvaise question. Une clinicienne qui voyait quotidiennement ce qui se passait lorsque les outils ignoraient ces différences. Une famille qui en avait ressenti le coût de première main. C'est cette combinaison qui est devenue Entrelacs."
      - "Entrelacs n'est pas conçu pour le patient moyen — car ce patient n'existe pas. Il est conçu pour l'être humain réel, spécifique et irréductiblement individuel qui a besoin de soins."     
