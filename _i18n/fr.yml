roi_calculator:
  tag: "Calculateur de ROI"
  title: "Vous payez pour la crise. <br> Vous pourriez investir dans la prévention"
  description: "La santé mentale n'a pas de système d'alerte précoce. Au moment où vous constatez l'impact de l'absentéisme, du turnover, des admissions aux urgences, cela vous coûte déjà."
  stats:
    - value: "~15 k€"
      strong_text: "Perdu par employé en crise"
      text: "Perte de productivité, coûts de remplacement et temps de gestion pour chaque cas grave."
      source: "Deloitte, 2022"
    - value: "< 5 %"
      strong_text: "Des problèmes détectés tôt"
      text: "Il n'existe pas de dépistage de routine de la santé mentale, les problèmes n'apparaissent qu'au point de rupture."
      source: "Panorama de la santé de l'OCDE, 2023"
