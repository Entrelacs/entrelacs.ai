employers:
  meta:
    title: "Entrelacs for Employers"
  hero:
    subtitle: "ENTRELACS FOR EMPLOYERS"
    title: "Prevent mental health crises before they hit your bottom line"
    description: "Entrelacs gives you early visibility into disconnection, loneliness, and flight risk — so you can act before it becomes burnout, an absence, a resignation, or a crisis."
    cta_demo: "Request a Demo"
  hidden_cost:
    tag: "The problem"
    title: "The hidden cost of disconnection is already in your numbers"
    text_intro: "Mental health crises cost your organization time, money, and talent — and the warning signs were there long before the crisis hit. The numbers tell the story:"
    stats:
      - value: "36%"
        body_line1: "of employees worldwide "
        body_line2: "feel lonely at work."
        source: "Gallup, 2024"
      - value: "2×"
        body_line1: "more likely to quit "
        body_line2: "within 12 months."
        source: "Cigna, 2020"
      - value: "$154B"
        body_line1: "lost annually by US employers"
        body_line2: "due to workplace loneliness."
        source: "Cigna, 2020"
      - value: "5.7"
        body_line1: "extra sick days per year "
        body_line2: "taken by lonely employees."
        source: "Bowers et al, 2022"
    bottom_text_line1: "By the time loneliness shows up in exit interviews, it's already too late. Entrelacs detects disconnection 4–6 weeks early — turning a costly crisis into a proactive win."
  how_it_works:
    title: "How entrelacs works for employers"
    subtitle: "From Invisible Risk to Measurable Action"
    steps:
      - title: "Personalized Employee Assessment"
        text: "Employees engage in brief, conversational check-ins (5-7 minutes) about their social connection—both generally and specifically within their work team."
      - title: "Individual Insights & Support"
        text: "Each employee receives confidential insights about their social connection patterns and practical, personalized recommendations tailored to their unique needs and style."
      - title: "Team & Organizational Intelligence"
        text: "With employee consent, anonymized and aggregated data provides HR teams and managers with unprecedented visibility into team dynamics and organizational connection health."
  differentiation:
    title: "What makes Entrelacs different"
    subtitle: "Beyond traditional engagement surveys"
  benefits:
    title: "Benefits that keep your best people"
    subtitle: "Early insights that protect your workforce."
    hr:
      title: "HR & Leadership"
      list:
        - "Early detection of flight risk before exit interviews"
        - "Reduced turnover costs — up to 50–200% of salary saved per employee"
        - "Data-driven resource allocation"
        - "Stronger cultural metrics (belonging, safety, trust)"
    managers:
      title: "Managers"
      list:
        - "Clear visibility into team connection challenges"
        - "Timely support conversations"
        - "Targeted team-building that actually works"
    employees:
      title: "Employees"
      list:
        - "Awareness of their connection needs"
        - "Practical, personalized guidance"
        - "Confidential experience with full control of their data"
  pricing:
    title: "Pricing & ROI"
    bullets:
      - strong: "No individual employee data"
        rest: " shared with employers"
      - strong: "4–5x ROI "
        rest: "on preventive mental health investment"
      - strong: "Results visible in weeks,"
        rest: " not months"
    cta: "Contact us"
    price:
      amount: "€150"
      suffix: "per employee/year"
      line_prefix: "Less than your current EAP, with "
      line_roi: "4–5x"
      line_suffix: " the ROI"
    calculator:
      before_link: "Use our "
      link: "ROI calculator"
      after_link: " to see potential savings"
      line2: "from reduced turnover"
  getting_started:
    title: "Getting started"
    subtitle: "For HR leaders & organizations."
    hero:
      heading: "Schedule a demonstration to see how Entrelacs enhances your workflow"
      body: "From your first conversation to a fully running pilot, Entrelacs is designed to integrate quickly — so your team can move from reactive crisis management to predictive workforce support in a matter of weeks."
      what_title: "What you get"
      what_list:
        - "Platform access for your selected employee groups"
        - "HR and manager training with full implementation support"
        - "ROI data and outcome tracking showing measurable impact on your workforce"
      next_title: "Next Steps"
      next_list:
        - "Request a personalized demo and ROI assessment"
        - "Pilot program designed around your organization"
        - "Training, onboarding, and ongoing optimization support"
      cta: "Request a demo"
    timeline:
      title: "Implementation Timeline"
      stages:
        - label: "Demo & ROI Assessment"
          period: "Week 1–2"
        - label: "Implementation & Training"
          period: "Week 3–4"
        - label: "Pilot Program Design & Launch"
          period: "Week 5–8"
        - label: "Optimization & Results Tracking"
          period: "Ongoing"
      cta: "Use the ROI Calculator"

