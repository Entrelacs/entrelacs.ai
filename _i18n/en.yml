home:
  meta:
    title: "Entrelacs"
  video_link: https://drive.google.com/file/d/1QEyT3gvR1x5NLjeVu4a0mDsuESGEOVMw/preview
  hero:
    title_prefix: "Mental health finally gets early detection"
    tag_text: "Clinical-Grade AI for Mental Health"
    wheel:
      item1: "when it matters"
      item2: "with clinical AI"
      item3: "before crisis"
      item4: "when it matters"
    cta_waitlist: "Join the waitlist for full access"
    cta_demo: "Request a demo"
  problem:
    tag: "The Problem"
    heading: "Mental health is the only area of medicine without early detection "
    description: "Clinical-grade screening, matching, and monitoring — so you can act weeks before a crisis, not months after."
    cardiology:
      title: "In cardiology"
      desc: "We catch warning signs years before a heart attack occurs."
    oncology:
      title: "In oncology"
      desc: "We screen before symptoms appear."
    mental_health:
      title: "But in <br> mental health"
      desc: "We wait until someone is already in crisis — when the cost is highest and the window for prevention has already passed."
  cost:
    heading: "The cost of waiting"
    description: "We're missing the early signs that could prevent bigger problems down the road, waiting until someone is already struggling before we act."
    stats:
      - value: "€600B"
        text: "Annual cost in EU alone from reactive mental health care."
      - value: "10–20%"
        text: "YoY growth in mental health claims seen by payers."
      - value: "€15K"
        text: "Lost per employee annually in productivity and turnover."
  pillars:
    heading: "From reactive to preventive in three steps"
    description: "Three pillars that move mental health care from reactive crisis response to proactive, measurable outcomes."
    cta: "Join the waiting list"
    list:
      - image: "/images/dart-mission-goal-success.svg"
        tag: "PRECISION"
        title: "Screen with clinical accuracy, not guesswork"
        desc: "One 15-minute conversational assessment creates a unique mental health profile for each individual - replacing lengthy and burdensome traditional assessment."
      - image: "/images/health.svg"
        tag: "PERSONALIZATION"
        title: "No more trial-and-error referrals"
        desc: "AI matches each individual to the most effective intervention from day one — reducing failed treatments and accelerating time to improvement by 2–3x."
      - image: "/images/fraudprotectmajor.svg"
        tag: "PREVENTION"
        title: "Detect deterioration weeks before crisis"
        desc: "Continuous digital monitoring tracks changes in engagement, language patterns, and behavioral signals between sessions, alerting care teams days to weeks before a crisis — turning reactive care into preventive care."
  how_it_works:
    tag: "How it works"
    heading: "Three steps. No disruption. Live in weeks."
    description: "Three steps that integrate into existing workflows — no additional clinical time required."
    cards:
      screen:
        tag: "SCREEN"
        title: "15-minute assessment"
        desc: "A conversational AI assessment identifies the 5–7 most informative questions unique to each person, screening for mood, anxiety, social connection, burnout, and risk factors in a single 15-minute session."
        benefits:
          - "Clear risk categories per person"
          - "Comprehensive"
          - "No clinical time required"
      match:
        tag: "MATCH"
        title: "Precision care matching"
        desc: "40–60% of people drop out of mental health care when the first treatment isn't the right fit. Precision matching connects each person to the right intervention from day one — achieving 2–3x faster improvement without trial and error."
        benefits:
          - "Right support, first time"
          - "Fewer failed treatments"
          - "2-3x faster improvement"
      monitor:
        tag: "MONITOR"
        title: "Continuous monitoring"
        desc: "Between appointments, the platform continuously tracks behavioral patterns — including digital engagement, language indicators, activity, sleep, and self-reported mood — detecting signs of deterioration days to weeks before a crisis develops. This early warning capability creates a critical window for timely, low-cost intervention before situations escalate."
        benefits:
          - "Alerts before problems escalate"
          - "Tracks changes between visits"
          - "Early warning before a crisis"
  research:
    heading: "Research-grade rigor, real-world proof"
    description: "Grounded in 80,000+ research articles, validated across 8 countries, and backed by €3M in EU funding."
    partnership: "Developed in partnership with WHO and EU policy frameworks"
    stats:
      - value: "80K+"
        label: "Research articles reviewed"
      - value: "8"
        label: "Countries validated"
      - value: "€3M"
        label: "EU research funding awarded"
      - value: "CE Mark"
        label: "Certification pathway, 2027"
  partners:
    heading: "Developed in collaboration with the world's leading research institutions"
    description: "Entrelacs is built on global scientific partnerships that ensure every clinical claim is grounded in evidence."
    logos:
      - src: "/images/university_of_california.png"
      - src: "/images/oecd.png"
      - src: "/images/university_of_oxford.png"
      - src: "/images/stanford_university.png"
      - src: "/images/european_commission.png"
        style: "max-height: 80px;"
