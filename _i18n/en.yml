roi_calculator:
  tag: "ROI Calculator"
  title: "You're paying for crisis. <br> You could be investing in prevention"
  description: "Mental health has no early warning system. By the time you see the impact of absenteeism, turnover, emergency admissions, it's already costing you."
  stats:
    - value: "~€15K"
      strong_text: "Lost per employee in crisis"
      text: "Productivity loss, replacement costs, and management time for each serious case."
      source: "Deloitte, 2022"
    - value: "<5%"
      strong_text: "Of problems caught early"
      text: "No routine mental health screening exists, issues surface only at breaking point."
      source: "OECD Health at a Glance, 2023"
    - value: "~10–20%"
      strong_text: "Annual claims growth"
      text: "Mental health costs are rising faster than any other category of health spend."
      source: "Mercer Marsh Benefits, 2023"
  cta: "Use our ROI calculator"

  link: "https://absl.shinyapps.io/entrelacs_workplace_simulator/"

