healthcare:
  hero:
    tag: "ENTRELACS FOR HEALTHCARE"
    title: "From assessment guesswork to precision mental healthcare"
    list:
      - "Unlock deeper accuracy with AI-powered conversational assessments and dynamic psychometrics."
      - "Diagnose with confidence using continuous, data-rich mental health insights."
      - "Deliver the right care faster through tailored, precision treatment matching."
    cta_sales: "Contact Sales"
    cta_demo: "Schedule a Demo"
  problem:
    tag: "The Problem"
    title: "The assessment gap driving inefficiency and poor outcomes"
    text: "Mental health care faces a fundamental problem: the assessment tools we rely on weren't designed for the complexity of the conditions we treat or the technology available to us today."
    list:
      - "Limited, inaccurate diagnostics miss nuances and evolving symptoms."
      - "Early risks go unseen, leading to preventable mental-health crises."
      - "Inefficient treatments rely on trial-and-error and delayed detection."
      - "Ineffective care drives unnecessary costs and poor ROI."
  solution:
    tag: "Our Solution"
    title: "Entrelacs addresses these challenges at their foundation with assessment technology designed for precision mental health care."
  features:
    assessment:
      title: "Comprehensive initial assessment"
      text: "Precision psychometrics deliver multi-dimensional insights, risk prediction, and diagnostic guidance."
      subhead: "Clinical advantages:"
      list:
        - "Higher precision"
        - "Captures nuanced patterns"
        - "Better patient experience"
        - "Structured documentation"
        - "Adaptive questioning"
