team:
  leadership:
    title: "Leadership team"
    subtitle: "Purpose-built expertise across science, technology, and healthcare."
    list:
      - name: "Dr Hans Rocha IJzerman"
        role: "CEO & Co-Founder"
        bio: "WHO & EU mental health policy advisor. University of Oxford affiliate researcher. Principal Investigator of the EU's €3M LONELY-EU Horizon Europe project. Published researcher with 10,000+ academic citations and one of the world's leading experts on social connection and mental health."
        image: "/images/LeadershipHans.png"
      - name: "Miguel Silan"
        role: "Chief Scientific Officer"
        bio: "Associate Director of the Psychological Science Accelerator — a global research network spanning 80+ countries. PhD in Psychology, specializes in large-scale studies of complex psychological systems. Author of 1,200+ academic citations. Led flagship multi-country behavioral studies across 20+ countries to establish culturally robust, mutli-domain measurement frameworks. The scientific backbone behind Entrelacs' cross-cultural validation and psychometric methodology."
        image: "/images/LeadershipMigs.png"
      - name: "Felix Moses"
        role: "Chief Technology Officer"
        bio: "Engineer and AI builder with deep experience in work with multidisciplinary teams to build market ready solutions. Expert in full-stack development, GCP infrastructure, and secure data pipelines — the architect behind Entrelacs' technical foundation."
        image: "/images/LeadershipFelix.png"
  extendedLeadership:
    title: "Extended leadership team"
    list:
      - name: "Daniela Rocha Lopes"
        role: "Chief Clinical Officer"
        bio: "Clinical psychologist with 15+ years of experience in mental health practice and operations. Director-General of Solstice Psychologues. Ensures clinical integrity across every element of the Entrelacs platform."
        image: "/images/LeadershipDaniela.png"
      - name: "Hilary Johnson"
        role: "Chief Product Officer"
        bio: "Former VP Product at Unmind. 15+ years in digital health UX. Brings world-class product leadership to Entrelacs' user experience and clinical workflows."
        image: "/images/LeadershipHilary.png"
      - name: "Matthew Reed"
        role: "Chief Financial Officer"
        bio: "Finance executive with 15 years in clean energy and regulated industries. Former EDF Group executive. Has overseen $26B raised in ESG capital throughout his career. Leads Entrelacs' financial strategy and investor relations."
        image: "/images/LeadershipMatthew.png"
      - name: "Cristina Claver Sicilia"
        role: "Chief Operations Officer"
        bio: "PharmD, MBA. Healthcare operations expert with deep experience leading pharmaceutical strategy implementation across Europe. Drives operational excellence and EU market access for Entrelacs."
        image: "/images/LeadershipCristina.png"
  advisors:
    title: "Strategic advisors"
    subtitle: "Guided by the minds shaping the future of AI, behavioral science, and global health."
    list:
      - name: "Dr. Michal Kosinski"
        role: "Stanford University"
        bio: "World-renowned expert in AI-driven behavioral prediction and psychometrics. His research on digital footprints and psychological profiling has been cited over 25,000 times. Advises on Entrelacs' AI methodology and behavioral prediction models."
        image: "/images/DrMichalKosinski.png"
      - name: "Jillian Miranda"
        role: "Medtech Growth Strategist"
        bio: "Previously scaled multiple digital health companies from pilot to global adoption. Expert in healthcare go-to-market strategy and B2B2C models. Guides Entrelacs' commercial strategy and enterprise growth."
        image: "/images/JillianMiranda.png"
      - name: "Ron Ivey"
        role: "Founder, HumanConnection.AI"
        bio: "Thought leader in AI ethics and responsible AI deployment in healthcare settings. Advises on regulatory positioning, ethical AI practices, and responsible deployment across clinical environments."
        image: "/images/RonIvey.png"
      - name: "Carson Kelly"
        role: "Compassion 2.0"
        bio: "Tech veteran and Compassion 2.0 advocate. Advises on embedding compassion-driven models into our platform."
        image: "/images/CarsonKelly.png"
      - name: "Emorie Beck"
        role: "UC Davis"
        bio: "Leading expert in personalized psychological measurement and individual differences research. Guides the psychometric methodology and measurement science that underpins the Entrelacs assessment engine."
        image: "/images/emoriebeck.jpg"
      
